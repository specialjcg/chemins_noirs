<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Chemins Noirs — Planificateur d'itinéraires hors-bitume. Trouvez les sentiers et chemins de traverse." />
    <meta name="theme-color" content="#0c100d" />
    <title>Chemins Noirs — Relevé Terrain</title>

    <!-- Font preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- MapLibre GL CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Application CSS -->
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="map"></div>

    <!-- Elm + MapLibre GL JS -->
    <script type="module" src="/src/main.js"></script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('[SW] Registered'))
          .catch(err => console.warn('[SW] Registration failed:', err));
      }
    </script>
  </body>
</html>
