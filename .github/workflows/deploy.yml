name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.agents/**'
      - '.claude/**'
      - '.continue/**'
      - '.junie/**'
      - '.openhands/**'
      - '.windsurf/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # --- Cache Rust build ---
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-target-

      # --- Install system deps ---
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libproj-dev libsqlite3-dev

      # --- Install Rust ---
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # --- Build Rust binary ---
      - name: Build release binary
        run: cargo build --release -p backend --bin backend_partial

      # --- Build frontend (Elm + Vite) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-elm/package-lock.json

      - name: Build frontend
        run: |
          cd frontend-elm
          npm ci
          npm run build

      # --- Deploy to VPS (single SSH connection with multiplexing) ---
      - name: Setup SSH with multiplexing
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p 9999 VPS-779132.ssh.vps1euro.fr >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config << 'SSHCFG'
          Host vps
            HostName VPS-779132.ssh.vps1euro.fr
            Port 9999
            User root
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ControlMaster auto
            ControlPath ~/.ssh/ctrl-%r@%h:%p
            ControlPersist 300
          SSHCFG

      - name: Open SSH tunnel and deploy
        run: |
          # Open persistent connection (all subsequent ssh/scp reuse it = 1 auth)
          ssh -fN vps

          # Disable fail2ban to prevent SSH bans during deploy
          ssh vps "systemctl stop fail2ban; systemctl disable fail2ban" || true

          # Ensure sufficient swap (VPS has only 1GB RAM, PBF parsing needs more)
          ssh vps << 'SWAP'
          if [ ! -f /swapfile ]; then
            echo "Creating 2GB swap file..."
            fallocate -l 2G /swapfile
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
            echo "Swap created"
          else
            swapon /swapfile 2>/dev/null || true
            echo "Swap already exists"
          fi
          free -h
          SWAP

          # Stop service
          ssh vps "systemctl stop cheminsnoirs || true"

          # Create dirs
          ssh vps "mkdir -p /opt/cheminsnoirs/{data/cache,frontend}"

          # Deploy binary and frontend
          scp target/release/backend_partial vps:/opt/cheminsnoirs/backend_partial
          scp -r frontend-elm/dist/* vps:/opt/cheminsnoirs/frontend/

          # Update nginx CSP + permissions + start service + diagnostics (single command)
          ssh vps << 'DEPLOY'
          set -e

          # --- Update nginx CSP ---
          sed -i "s|style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;|style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com;|" /etc/nginx/sites-enabled/cheminsnoirs
          sed -i "s|connect-src 'self' https://\*\.tile\.openstreetmap\.org|connect-src 'self' https://tile.openstreetmap.org https://*.tile.openstreetmap.org|" /etc/nginx/sites-enabled/cheminsnoirs
          sed -i "s|img-src 'self' data: blob: https://\*\.tile\.openstreetmap\.org|img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org|" /etc/nginx/sites-enabled/cheminsnoirs
          nginx -t && systemctl reload nginx

          # --- Permissions ---
          id cheminsnoirs &>/dev/null || useradd -r -s /usr/sbin/nologin -d /opt/cheminsnoirs -M cheminsnoirs
          chmod 750 /opt/cheminsnoirs/backend_partial
          chown -R cheminsnoirs:cheminsnoirs /opt/cheminsnoirs
          chmod 755 /opt/cheminsnoirs /opt/cheminsnoirs/frontend
          find /opt/cheminsnoirs/frontend -type f -exec chmod 644 {} \;

          # --- Start service ---
          if [ -f /opt/cheminsnoirs/data/rhone-alpes-251111.osm.pbf ]; then
            systemctl start cheminsnoirs
            sleep 3
            systemctl is-active cheminsnoirs
          else
            echo "PBF absent — service non démarré (deploy frontend/binary OK)"
          fi

          # --- Diagnostics ---
          echo "=== MEMORY ===" && free -h
          echo "=== DISK ===" && df -h /opt/cheminsnoirs
          echo "=== PBF ===" && ls -lh /opt/cheminsnoirs/data/*.pbf 2>/dev/null || echo "NO PBF"
          echo "=== CACHE ===" && ls -lh /opt/cheminsnoirs/data/cache/ 2>/dev/null || echo "NO CACHE"
          echo "=== RECENT LOGS ===" && journalctl -u cheminsnoirs --no-pager -n 20
          echo "=== NGINX CSP ===" && grep -o 'connect-src[^;]*' /etc/nginx/sites-enabled/cheminsnoirs
          DEPLOY

      - name: Cleanup SSH
        if: always()
        run: |
          ssh -O exit vps 2>/dev/null || true
          rm -f ~/.ssh/id_deploy
